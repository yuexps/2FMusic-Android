name: Android R8 Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: android-r8-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build R8 release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            --channel=3 \
            "platform-tools" \
            "platforms;android-37" \
            "build-tools;36.0.0"

      - name: Restore release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/2fmusic-release.jks"
          chmod 600 "$RUNNER_TEMP/2fmusic-release.jks"

      - name: Build signed R8 release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/2fmusic-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew clean :androidApp:assembleRelease --no-daemon --no-parallel

      - name: Verify APK signature and R8 outputs
        shell: bash
        run: |
          APK="$(find androidApp/build/outputs/apk/release -name '*.apk' -print -quit)"
          test -n "$APK"
          test -f androidApp/build/outputs/mapping/release/mapping.txt
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify \
            --verbose \
            --print-certs \
            "$APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: 2FMusic-r8-${{ github.ref_name }}-${{ github.run_number }}
          path: androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v6
        with:
          name: 2FMusic-r8-mapping-${{ github.run_number }}
          path: androidApp/build/outputs/mapping/release/
          if-no-files-found: error
          retention-days: 30
